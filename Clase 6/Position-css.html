<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./Position-css.css" />
  </head>
  <body>
    <a id="bn-Inicio" href="/index.html">
      <button>Inicio</button>
    </a>
    <nav class="navbar">
      <div class="logo">Mi Logo</div>
      <div class="nav-links">
        <a href="#inicio">Inicio</a>
        <a href="#servicios">Servicios</a>
        <a href="#contacto">Contacto</a>
      </div>
      <button class="login-button">Login</button>
    </nav>
    <div class="cookie-footer">
      <p>
        Este sitio utiliza cookies para mejorar la experiencia.
        <a href="#cookies-policy">Más información</a>.
      </p>
      <button class="cookie-accept">Aceptar</button>
    </div>
    <div class="card-horizontal">
      <img
        src="https://via.placeholder.com/150"
        alt="Imagen descriptiva"
        class="card-image"
      />
      <div class="card-description">
        <h3>Producto XYZ</h3>
        <p>
          Esta es la descripción de nuestro producto. Es increíblemente útil y
          visualmente atractivo.
        </p>
      </div>
    </div>
    <div class="game-container">
      <img
        class="bg-game"
        src="https://c4.wallpaperflare.com/wallpaper/198/583/580/angry-birds-video-games-wallpaper-preview.jpg"
        alt=""
      />
      <div class="equis">✖️</div>
      <h1 class="game-title">ANGRY BIRDS</h1>
      <div class="bird bird-1"></div>
      <div class="bird bird-2"></div>
      <button class="btn-play">PLAY</button>
      <div class="btn-config-game">
        <button class="btn-settings">⚙️</button>
        <button class="btn-world">👾</button>
        <button class="btn-menu">🚀</button>
      </div>
    </div>
  </body>
</html>
